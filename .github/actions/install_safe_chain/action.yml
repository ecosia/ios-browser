name: 'Setup safe-chain'
description: 'Install aikidosec/safe-chain to guard against malicious dependencies'
runs:
  using: "composite"
  steps:
    - name: "Setup safe-chain"
      shell: bash
      run: |
        curl -fsSL https://github.com/AikidoSec/safe-chain/releases/download/1.5.2/install-safe-chain.sh -o /tmp/install-safe-chain.sh
        echo "f6d520c9f72f1ae3f12a1846ef2aebc515d5a8254b2013cb54794a507403e926  /tmp/install-safe-chain.sh" | sha256sum -c -
        sh /tmp/install-safe-chain.sh --ci
        rm /tmp/install-safe-chain.sh
