name: 'Install safe-chain'
description: 'Installs Aikido Safe Chain to protect package manager invocations from malware'

runs:
  using: "composite"
  steps:
    - name: Install safe-chain
      shell: bash
      run: |
        SAFE_CHAIN_VERSION="1.5.2"
        # SHA256 checksum of the install script for v${SAFE_CHAIN_VERSION}.
        # Obtain from: https://github.com/AikidoSec/safe-chain/releases/download/${SAFE_CHAIN_VERSION}/install-safe-chain.sh
        # Update this value whenever SAFE_CHAIN_VERSION is bumped.
        EXPECTED_SHA256="f6d520c9f72f1ae3f12a1846ef2aebc515d5a8254b2013cb54794a507403e926"
        SCRIPT_URL="https://github.com/AikidoSec/safe-chain/releases/download/${SAFE_CHAIN_VERSION}/install-safe-chain.sh"

        curl -fsSL "$SCRIPT_URL" -o /tmp/install-safe-chain.sh
        echo "${EXPECTED_SHA256}  /tmp/install-safe-chain.sh" | sha256sum --check
        sh /tmp/install-safe-chain.sh --ci
        rm /tmp/install-safe-chain.sh
