name: SwiftLint
on:
  pull_request:
    branches: [main, 'patch/**', 'develop']
  push:
    branches: [tuist-implementation]
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/realm/swiftlint:0.63.2

    steps:
      - uses: actions/checkout@v4

      - name: Install safe-chain
        run: curl -fsSL https://github.com/AikidoSec/safe-chain/releases/download/1.5.2/install-safe-chain.sh | sh -s -- --ci

      - name: SwiftLint
        run: |
          swiftlint --reporter github-actions-logging --strict
