name: SwiftLint
on:
  pull_request:
    branches: [main, 'patch/**', 'develop']
  push:
    branches: [tuist-implementation]
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/realm/swiftlint:0.63.2

    steps:
      - uses: actions/checkout@v4

      - name: Install safe-chain
        uses: ./.github/actions/install_safe_chain

      - name: SwiftLint
        run: |
          swiftlint --reporter github-actions-logging --strict
